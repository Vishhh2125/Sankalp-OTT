<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>OTT Reels Player</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; background:#0D0010; color:#fff; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; overflow:hidden; }

  .app { height:100vh; display:flex; flex-direction:column; }

  .tabs { display:flex; border-bottom:1px solid #3A0040; background:#140018; flex-shrink:0; }
  .tab { flex:1; padding:12px; text-align:center; font-size:13px; font-weight:500; color:#7a5080; cursor:pointer; border-bottom:2px solid transparent; transition:all .2s; }
  .tab.active { color:#FF2D55; border-bottom-color:#FF2D55; }
  .tab:hover { color:#FF6584; }

  .reel-container { flex:1; position:relative; overflow:hidden; }

  .reel-item { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; background:#000; transition:transform .35s cubic-bezier(.4,0,.2,1); }
  .reel-item video { width:100%; height:100%; object-fit:contain; background:#000; }

  .reel-overlay { position:absolute; bottom:0; left:0; right:0; padding:20px; background:linear-gradient(transparent, rgba(13,0,16,0.95)); pointer-events:none; }
  .reel-title { font-size:18px; font-weight:700; margin-bottom:4px; text-shadow:0 1px 4px rgba(0,0,0,.6); }
  .reel-meta { font-size:12px; color:#c0a0c8; margin-bottom:8px; }
  .reel-tags { display:flex; gap:6px; flex-wrap:wrap; }
  .reel-tag { font-size:11px; background:rgba(255,45,85,.15); color:#FF6584; padding:2px 8px; border-radius:12px; border:1px solid rgba(255,45,85,.25); }

  .reel-nav { position:absolute; right:16px; top:50%; transform:translateY(-50%); display:flex; flex-direction:column; gap:12px; z-index:10; }
  .nav-btn { width:44px; height:44px; border-radius:50%; background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.15); color:#fff; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; backdrop-filter:blur(8px); transition:all .15s; }
  .nav-btn:hover { background:rgba(255,45,85,.3); border-color:#FF2D55; }
  .nav-btn:disabled { opacity:.3; cursor:default; }

  .episode-indicator { position:absolute; bottom:80px; left:50%; transform:translateX(-50%); background:rgba(26,0,32,.8); border:1px solid #3A0040; padding:6px 16px; border-radius:20px; font-size:12px; color:#c0a0c8; backdrop-filter:blur(8px); z-index:10; white-space:nowrap; }

  .loading-screen { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#0D0010; z-index:100; }
  .spinner { width:32px; height:32px; border:3px solid #3A0040; border-top-color:#FF2D55; border-radius:50%; animation:spin .8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .loading-text { margin-top:12px; color:#7a5080; font-size:13px; }

  .empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; color:#7a5080; }
  .empty-state h2 { color:#c0a0c8; margin-bottom:8px; }

  .show-list { flex:1; overflow-y:auto; padding:16px; }
  .show-card { background:#1A0020; border:1px solid #3A0040; border-radius:12px; padding:14px; margin-bottom:10px; cursor:pointer; transition:border-color .15s; }
  .show-card:hover { border-color:#FF2D55; }
  .show-card-title { font-weight:600; font-size:15px; margin-bottom:4px; }
  .show-card-meta { font-size:12px; color:#7a5080; }
  .show-card-eps { font-size:11px; color:#FF6584; margin-top:6px; }

  .mode-label { position:absolute; top:16px; left:16px; background:rgba(255,45,85,.2); color:#FF2D55; padding:4px 10px; border-radius:8px; font-size:11px; font-weight:600; z-index:10; border:1px solid rgba(255,45,85,.3); }
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
const API = 'http://localhost:3000/api';
let currentMode = 'foryou';
let currentItems = [];
let currentIndex = 0;
let hlsInstance = null;
let currentShowId = null;

// ── Render ──
function render() {
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="tabs">
      <div class="tab ${currentMode==='foryou'?'active':''}" onclick="switchMode('foryou')">For You</div>
      <div class="tab" onclick="switchMode('browse')">Browse Shows</div>
    </div>
    <div class="reel-container" id="reelContainer"></div>
  `;

  if (currentMode === 'foryou') loadForYouFeed();
  else if (currentMode === 'showmode') loadShowMode(currentShowId);
  else if (currentMode === 'browse') renderBrowse();
}

function switchMode(mode) {
  destroyHls();
  currentMode = mode;
  currentIndex = 0;
  currentItems = [];
  render();
}

// ── For You Feed ──
async function loadForYouFeed() {
  const container = document.getElementById('reelContainer');
  container.innerHTML = '<div class="loading-screen"><div class="spinner"></div><div class="loading-text">Loading feed...</div></div>';

  try {
    const res = await fetch(`${API}/feed/for-you?limit=20`);
    const data = await res.json();
    currentItems = data.items || [];

    if (currentItems.length === 0) {
      container.innerHTML = '<div class="empty-state"><h2>No shows yet</h2><p>Upload dramas from the admin panel first</p></div>';
      return;
    }

    currentIndex = 0;
    renderReel();
  } catch (err) {
    container.innerHTML = `<div class="empty-state"><h2>Failed to load</h2><p>${err.message}</p></div>`;
  }
}

// ── Show Mode ──
async function loadShowMode(showId, fromEp = 1) {
  currentShowId = showId;
  currentMode = 'showmode';
  const container = document.getElementById('reelContainer');
  container.innerHTML = '<div class="loading-screen"><div class="spinner"></div><div class="loading-text">Loading episodes...</div></div>';

  try {
    const res = await fetch(`${API}/feed/show/${showId}?from_ep=${fromEp}&limit=50`);
    const data = await res.json();

    currentItems = (data.episodes || []).filter(ep => ep.hls_url).map(ep => ({
      show_id: data.show_id,
      show_title: data.show_title,
      synopsis: data.synopsis,
      tags: data.tags || [],
      episode_id: ep.episode_id,
      episode_num: ep.episode_num,
      hls_url: ep.hls_url,
      duration_sec: ep.duration_sec,
      total_episodes: data.total_episodes,
      title: ep.title,
    }));

    if (currentItems.length === 0) {
      container.innerHTML = '<div class="empty-state"><h2>No ready episodes</h2><p>Episodes are still processing</p></div>';
      return;
    }

    currentIndex = 0;
    renderReel();
  } catch (err) {
    container.innerHTML = `<div class="empty-state"><h2>Failed to load</h2><p>${err.message}</p></div>`;
  }
}

// ── Browse Shows ──
async function renderBrowse() {
  const container = document.getElementById('reelContainer');
  container.innerHTML = '<div class="loading-screen"><div class="spinner"></div><div class="loading-text">Loading shows...</div></div>';

  try {
    const res = await fetch(`${API}/content/shows`);
    const data = await res.json();
    const shows = data.items || data || [];

    if (shows.length === 0) {
      container.innerHTML = '<div class="empty-state"><h2>No shows</h2><p>Create dramas from the admin panel</p></div>';
      return;
    }

    container.innerHTML = `<div class="show-list">${shows.map(s => `
      <div class="show-card" onclick="loadShowMode('${s.id}')">
        <div class="show-card-title">${s.title}</div>
        <div class="show-card-meta">${s.category || ''} · ${s.rating_avg > 0 ? s.rating_avg + '★' : 'No ratings'}</div>
        <div class="show-card-eps">${s.episode_count || 0} episodes · ${(s.tags||[]).join(', ')}</div>
      </div>
    `).join('')}</div>`;
  } catch (err) {
    container.innerHTML = `<div class="empty-state"><h2>Failed</h2><p>${err.message}</p></div>`;
  }
}

// ── Reel Renderer ──
function renderReel() {
  const container = document.getElementById('reelContainer');
  const item = currentItems[currentIndex];
  if (!item) return;

  const isShowMode = currentMode === 'showmode';
  const modeLabel = isShowMode ? `Show mode · ${item.show_title}` : 'For You';

  container.innerHTML = `
    <div class="mode-label">${modeLabel}</div>
    <div class="reel-item" id="reelCurrent">
      <video id="videoPlayer" playsinline muted autoplay></video>
    </div>
    <div class="reel-overlay">
      <div class="reel-title">${isShowMode ? `EP.${item.episode_num} · ${item.title || item.show_title}` : item.show_title}</div>
      <div class="reel-meta">
        ${isShowMode ? `Episode ${item.episode_num} of ${item.total_episodes}` : `${item.duration_sec ? Math.floor(item.duration_sec/60)+'m' : ''} · ${item.view_count||0} views`}
      </div>
      <div class="reel-tags">${(item.tags||[]).map(t=>`<span class="reel-tag">${t}</span>`).join('')}</div>
    </div>
    <div class="episode-indicator">
      ${isShowMode ? `EP.${item.episode_num} / ${item.total_episodes}` : `${currentIndex+1} / ${currentItems.length} shows`}
    </div>
    <div class="reel-nav">
      <button class="nav-btn" onclick="prevReel()" ${currentIndex===0?'disabled':''}>▲</button>
      <button class="nav-btn" onclick="nextReel()" ${currentIndex>=currentItems.length-1?'disabled':''}>▼</button>
      ${!isShowMode && item.show_id ? `<button class="nav-btn" onclick="loadShowMode('${item.show_id}')" title="Watch all episodes" style="font-size:13px">📋</button>` : ''}
    </div>
  `;

  playVideo(item);
}

// ── HLS Player ──
function destroyHls() {
  if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
}

function playVideo(item) {
  destroyHls();
  const video = document.getElementById('videoPlayer');
  if (!video || !item.hls_url) return;

  const base = 'http://localhost:3000';
  const url = item.hls_url.startsWith('http')
    ? item.hls_url
    : base + item.hls_url;

  if (Hls.isSupported()) {
    hlsInstance = new Hls({
      maxBufferLength: 30,
      maxMaxBufferLength: 60,
      startLevel: -1,
      capLevelToPlayerSize: true,
      enableWorker: false,
    });
    hlsInstance.loadSource(url);
    hlsInstance.attachMedia(video);
    hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
      video.muted = true;
      video.play().catch(err => console.warn('Autoplay blocked:', err));
    });
    hlsInstance.on(Hls.Events.ERROR, (e, data) => {
      if (data.fatal) console.error('HLS fatal error:', data.type, data.details);
    });
  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    // Safari native HLS
    video.src = url;
    video.addEventListener('loadedmetadata', () => {
      video.muted = true;
      video.play().catch(() => {});
    }, { once: true });
  }
}  // ← closing brace for playVideo()

function nextReel() {
  if (currentIndex < currentItems.length - 1) {
    currentIndex++;
    renderReel();
  }
}

function prevReel() {
  if (currentIndex > 0) {
    currentIndex--;
    renderReel();
  }
}

// ── Keyboard + Touch ──
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowDown' || e.key === ' ') { e.preventDefault(); nextReel(); }
  if (e.key === 'ArrowUp') { e.preventDefault(); prevReel(); }
});

let touchStartY = 0;
document.addEventListener('touchstart', (e) => { touchStartY = e.touches[0].clientY; }, { passive: true });
document.addEventListener('touchend', (e) => {
  const diff = touchStartY - e.changedTouches[0].clientY;
  if (Math.abs(diff) > 50) { diff > 0 ? nextReel() : prevReel(); }
}, { passive: true });

// ── Init ──
render();
</script>
</body>
</html>
